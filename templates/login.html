{% extends "base.html" %}

{% block title %}Login | Comissionamento{% endblock %}

{% block content %}
<section class="panel auth-panel">
  <h2>Entrar</h2>
  <p class="muted">Use seu usuario e senha para acessar.</p>
  <form method="post" class="grid-form auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>
      Usuario
      <input type="text" name="username" required>
    </label>
    <label>
      Senha
      <input type="password" name="password" required>
    </label>
    <button class="btn btn-primary" type="submit">Entrar</button>
  </form>
  <p class="muted small"><a href="{{ url_for('forgot_password') }}">Esqueci minha senha</a></p>
  <p class="muted small">Primeiro acesso? configure o administrador inicial em <a href="{{ url_for('setup_admin') }}">setup-admin</a>.</p>
</section>
{% endblock %}
